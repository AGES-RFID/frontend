name: PR to Trunk

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================
  # ENTRY GATE
  # ==========================================
  entry-gate:
    name: 🚪 Entry Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Validate Branch Name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feat|fix|chore|docs|refactor)\/[0-9]+-[a-z0-9-]+$ ]]; then
            echo "❌ ERRO: Nome da branch '$BRANCH_NAME' fora do padrão."
            echo "💡 Padrão: <tipo>/<id>-<descricao>"
            exit 1
          fi

      - name: 💬 Validate PR Title (Semantic)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # SECURITY GATE
  # ==========================================
  security-gate:
    name: 🔐 Security Gate
    needs: [entry-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile
      
      - name: 📦 Vulnerability Scan (Bun Audit)
        run: bun audit

  # ==========================================
  # QUALITY GATE
  # ==========================================
  quality-gate:
    name: 💎 Quality Gate
    needs: [security-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile

      - name: 🧹 Quality Check (Lint & Format)
        run: bun run check

      - name: 🧪 Unit Tests (Coverage)
        run: bun run test:cov

  # ==========================================
  # BUILD GATE
  # ==========================================
  build-gate:
    name: 🏗️ Build Gate
    needs: [quality-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile

      - name: 📦 Build Application
        run: bun run build

  # ==========================================
  # EXIT GATE
  # ==========================================
  exit-gate:
    name: 🏁 Exit Gate
    if: always()
    needs: [entry-gate, security-gate, quality-gate, build-gate]
    runs-on: ubuntu-latest
    steps:
      - name: 📊 DevEx Report
        run: |
          echo "## 🏁 Resumo da Validação do PR" >> $GITHUB_STEP_SUMMARY
          echo "- **🚪 Entry Gate:** ${{ needs.entry-gate.result == 'success' && '✅ Aprovado' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **🔐 Security Gate:** ${{ needs.security-gate.result == 'success' && '✅ Seguro' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **💎 Quality Gate:** ${{ needs.quality-gate.result == 'success' && '✅ Código Limpo' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **🏗️ Build Gate:** ${{ needs.build-gate.result == 'success' && '✅ Compilado' || '❌ Falhou' }}" >> $GITHUB_STEP_SUMMARY
